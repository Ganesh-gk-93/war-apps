apiVersion: apps/v1
kind: Deployment
metadata:
  name: celebration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celebration
  template:
    metadata:
      labels:
        app: celebration
    spec:
      containers:
      - name: celebration
        image: localhost:5000/celebration:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: celebration-svc
spec:
  type: NodePort
  selector:
    app: celebration
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30081   # Use 30081, 30082, 30083, 30084 for others