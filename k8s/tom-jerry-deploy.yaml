apiVersion: apps/v1
kind: Deployment
metadata:
  name: tom_and_jerry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tom_and_jerry
  template:
    metadata:
      labels:
        app: tom_and_jerry
    spec:
      containers:
      - name: tom_and_jerry
        image: localhost:5000/tom_and_jerry:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tom_and_jerry-svc
spec:
  type: NodePort
  selector:
    app: tom_and_jerry
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30084   # Use 30081, 30082, 30083, 30084 for others