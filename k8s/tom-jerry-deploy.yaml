apiVersion: apps/v1
kind: Deployment
metadata:
  name: tom-and-jerry          # hyphen not underscore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tom-and-jerry
  template:
    metadata:
      labels:
        app: tom-and-jerry
    spec:
      containers:
      - name: tom-and-jerry    # hyphen not underscore
        image: localhost:5000/tom_and_jerry:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tom-and-jerry-svc      # hyphen not underscore
spec:
  type: NodePort
  selector:
    app: tom-and-jerry
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30084