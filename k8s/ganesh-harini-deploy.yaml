apiVersion: apps/v1
kind: Deployment
metadata:
  name: ganesh_harini
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ganesh_harini
  template:
    metadata:
      labels:
        app: ganesh_harini
    spec:
      containers:
      - name: ganesh_harini
        image: localhost:5000/ganesh_harini:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ganesh_harini-svc
spec:
  type: NodePort
  selector:
    app: ganesh_harini
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30083   # Use 30081, 30082, 30083, 30084 for others