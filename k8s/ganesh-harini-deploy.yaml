apiVersion: apps/v1
kind: Deployment
metadata:
  name: ganesh-harini          # hyphen not underscore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ganesh-harini
  template:
    metadata:
      labels:
        app: ganesh-harini
    spec:
      containers:
      - name: ganesh-harini    # hyphen not underscore
        image: localhost:5000/ganesh_harini:latest   # underscore OK here (Docker image name)
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ganesh-harini-svc      # hyphen not underscore
spec:
  type: NodePort
  selector:
    app: ganesh-harini
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30083