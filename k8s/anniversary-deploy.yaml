apiVersion: apps/v1
kind: Deployment
metadata:
  name: anniversary
  namespace: anniversary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anniversary
  template:
    metadata:
      labels:
        app: anniversary
    spec:
      containers:
      - name: anniversary
        image: localhost:5000/anniversary:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: anniversary-svc
spec:
  type: NodePort
  selector:
    app: anniversary
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080   # Use 30081, 30082, 30083, 30084 for others